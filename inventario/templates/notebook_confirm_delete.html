{% extends 'base.html' %}

{% block contenido %}
<div class='row justify-content-center'>
    <div class='col-md-8 col-lg-6'>
        <div class='card shadow-sm border-danger'> <div class='card-body'>
                <h2 class='card-title text-danger mb-3'>Eliminar notebook</h2> <p class="mb-4">
                    ¿Estás seguro de que deseas eliminar permanentemente el notebook: 
                    <span class="badge bg-secondary">{{ object }}</span>?
                </p>

                <form method='post'>
                    {% csrf_token %}
                    <button type='submit' class='btn btn-danger'>
                        Confirmar eliminación
                    </button>
                    <a href='{% url "notebook_list" %}' class='btn btn-outline-secondary'>
                        Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
